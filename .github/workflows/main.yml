name: Run Trading Agents Pipeline

# The 'workflow_dispatch' trigger is what creates the "Run workflow" button 
# so you can execute this entirely on demand.
on:
  workflow_dispatch:

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Get your code from the repository
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 2: Set up the Python environment (similar to creating your venv)
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' # Update this if you are using a different version

      # Step 3: Install your required packages
      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Step 4: Execute the actual LLM script
      - name: Run Main Script
        env:
          # You MUST set this in GitHub Secrets so Groq can authenticate
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
        run: python main.py
