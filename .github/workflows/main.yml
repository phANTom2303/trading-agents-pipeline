name: Run Trading Agents Pipeline

on:
  workflow_dispatch: # Keeps the manual "Run workflow" button
  schedule:
    # 10:30 UTC is exactly 4:00 PM IST. 
    # The '1-5' ensures it only runs Monday through Friday (market days).
    - cron: '30 10 * * 1-5'

jobs:
  execute-pipeline:
    runs-on: ubuntu-latest
    strategy:
      # Prevents the entire batch from failing if just one stock errors out
      fail-fast: false 
      matrix:
        # Your 5 specific Indian stocks
        company: [RELIANCE, TATASTEEL, ICICIBANK, ETERNAL, ADANIENT]

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10' 
          cache: 'pip' # Efficiently caches your requirements.txt

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Main Script for ${{ matrix.company }}
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          COMPANY_NAME: ${{ matrix.company }}
          # Database Secrets mapping to Environment Variables
          DB_HOST: ${{ secrets.DB_HOST }}
          DB_NAME: ${{ secrets.DB_NAME }}
          DB_USER: ${{ secrets.DB_USER }}
          DB_PASSWORD: ${{ secrets.DB_PASSWORD }}
          DB_PORT: ${{ secrets.DB_PORT }}
        run: python main.py
